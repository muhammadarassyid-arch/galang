<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
    padding-bottom:70px;
}

.header{
    background:#000;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    border-bottom:2px solid gold;
}

.logo{
    font-family: Times New Roman;
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;

    background:linear-gradient(
        45deg,
        #FFD700,
        #FFF8DC,
        #FFD700
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.icon-btn{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.slider{
    width:100%;
    height:220px;
    overflow:hidden;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.auth{
    display:flex;
}

.login{
    width:50%;
    height:50px;
    border:none;
    background:#555;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.register{
    width:50%;
    height:50px;
    border:none;
    background:#d60000;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.marquee{
    background:#1c1c1c;
    color:gold;
    padding:10px;
    overflow:hidden;
}

.marquee span{
    animation:jalan 15s linear infinite;
    display:inline-block;
}

@keyframes jalan{
    from{transform:translateX(100%);}
    to{transform:translateX(-100%);}
}

.menu{
    display:flex;
    overflow-x:auto;
    background:#d4af37;
}

.menu::-webkit-scrollbar{
    display:none;
}

.menu-item{
    min-width:90px;
    text-align:center;
    padding:12px;
    color:black;
    font-weight:bold;
}

.stats{
    background:#1e1e1e;
    margin:10px;
    border-radius:10px;
    padding:15px;
    text-align:center;
}

.stats h1{
    color:gold;
}

.section-title{
    padding:15px;
    color:gold;
}

.games{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    text-align:center;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    background:#d4af37;
    display:flex;
}

.bottom-nav button{
    flex:1;
    border:none;
    background:none;
    font-weight:bold;
    cursor:pointer;
}
.slider{
    position:relative;
    z-index:10;
    height:220px;
}

</style>
</head>
<body>

<header class="header">
    <button class="icon-btn" onclick="openMenu()">☰</button>

    <div class="logo">GALANG JUDI03</div>

    <button class="icon-btn" onclick="profile()">👤</button>
</header>

<div class="slider">
    <img id="banner"
    src="galang.jpg">
</div>

<div class="auth">
    <button class="login" onclick="login()">LOGIN</button>
    <button class="register" onclick="register()">DAFTAR</button>
</div>

<div class="marquee">
<span>
🎮 Selamat datang di GALANG JUDI03 jka bermain di sini maka sudah di pastikan anda akan rungkad secara bertahap
</span>
</div>

<div class="menu">

<div class="menu-item">🎮<br>Slot</div>
<div class="menu-item">🏎️<br>Kasino</div>
<div class="menu-item">⚽<br>Sports</div>
<div class="menu-item">🧩<br>Puzzle</div>
<div class="menu-item">🗡️<br>RTP</div>

</div>

<div class="stats">
    <p>Total Pemain</p>
    <h1 id="playerCount">35887</h1>
</div>

<h2 class="section-title">
🔥 GAME POPULER
</h2>

<div class="games">

<div class="card" onclick="playGame('mahjong1')">
<img src="judi1.jpg">
<h3>Mahjong1</h3>
</div>

<div class="card" onclick="playGame('mahjong2')">
<img src="judi2.jpg">
<h3>Mahjong2</h3>
</div>

<div class="card" onclick="playGame('wild banfito')">
<img src="judi4.jpg">
<h3>Wild Bandito</h3>
</div>

<div class="card" onclick="playGame('wild Bounti')">
<img src="judi3.jpg">
<h3>Wild Bounti</h3>
</div>

</div>

<nav class="bottom-nav">
<button onclick="home()">🏠<br>Home</button>
<button onclick="promo()">🎁<br>Promo</button>
<button onclick="chat()">💬<br>Chat</button>
<button onclick="profile()">👤<br>Akun</button>
</nav>

<script>

const banners = [
"https://savaya303.com/register",
"https://savaya303.com/",
"https://savaya303.com/promotion"
];
];

let current = 0;

setInterval(()=>{
    current++;

    if(current >= banners.length){
        current = 0;
    }

    document.getElementById("banner").src =
    banners[current];

},3000);

function login(){
    alert("Halaman Login");
}

function register(){
    alert("Halaman Pendaftaran");
}

function home(){
    alert("Home");
}

function promo(){
    alert("Promo Event");
}

function chat(){
    alert("Live Chat");
}

function profile(){
    alert("Profil Pengguna");
}

function openMenu(){
    alert("Menu Dibuka");
}

function playGame(game){
    alert("Membuka " + game);
}

setInterval(()=>{

    let player =
    document.getElementById("playerCount");

    let current =
    parseInt(player.innerText);

    let random =
    Math.floor(Math.random()*50)+1;

    player.innerText =
    current + random;

},3000);
</script>

</body>
</html>
